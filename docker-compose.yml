# Ollama containerization for Mumei Self-Healing / MCP Server
#
# Usage:
#   1. docker compose up -d
#   2. docker exec mumei-ollama ollama pull qwen3.5
#      (or lightweight: docker exec mumei-ollama ollama pull qwen3.5:small)
#   3. Set in .env:
#        LLM_API_KEY=ollama
#        LLM_BASE_URL=http://localhost:11434/v1
#        LLM_MODEL=qwen3.5
#   4. Run python self_healing.py / python mcp_server.py from host
#
# For GPU usage:
#   - nvidia-container-toolkit must be installed
#   - Uncomment the deploy section below

services:
  ollama:
    image: ollama/ollama:latest
    container_name: mumei-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    # Uncomment below for GPU support
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  ollama_models:
