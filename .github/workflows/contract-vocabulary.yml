name: Contract Vocabulary

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'README.md'
      - 'instruction.md'
      - 'mcp_server.py'
      - 'src/cli.rs'
      - 'scripts/check_contract_vocabulary.py'
      - '.github/workflows/contract-vocabulary.yml'
  workflow_dispatch:

jobs:
  contract-vocabulary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check docs contract vocabulary
        run: python3 scripts/check_contract_vocabulary.py
