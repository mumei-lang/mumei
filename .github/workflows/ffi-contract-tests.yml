name: FFI Contract Tests

on:
  pull_request:
    paths:
      - 'std/**'
      - 'mumei-core/src/ffi/**'
      - 'mumei-ffi-tests/**'
      - 'tests/ffi_contracts/**'
      - 'scripts/ffi_contract_test_gen.py'
      - 'Cargo.toml'
      - 'mumei-core/Cargo.toml'
      - '.github/workflows/ffi-contract-tests.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ffi-contract-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libz3-dev z3 libzstd-dev libclang-dev
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc > /dev/null
          codename=$(lsb_release -cs)
          echo "deb http://apt.llvm.org/${codename}/ llvm-toolchain-${codename}-17 main" \
            | sudo tee /etc/apt/sources.list.d/llvm-17.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y llvm-17-dev libclang-17-dev libpolly-17-dev
          echo "LLVM_SYS_170_PREFIX=/usr/lib/llvm-17" >> "$GITHUB_ENV"
          echo "LIBCLANG_PATH=/usr/lib/x86_64-linux-gnu" >> "$GITHUB_ENV"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-ffi-contract-tests-${{ hashFiles('Cargo.toml', '**/Cargo.toml') }}
          restore-keys: |
            cargo-ffi-contract-tests-

      - name: Generate FFI contract tests
        run: python3 scripts/ffi_contract_test_gen.py --report

      - name: Verify generated tests are checked in
        run: git diff --exit-code -- tests/ffi_contracts

      - name: Run FFI contract tests
        run: cargo test -p mumei-ffi-tests
