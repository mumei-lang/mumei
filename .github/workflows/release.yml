name: Release
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
  pages: write
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-15-intel
            name: mumei-x86_64-apple-darwin
          - target: aarch64-apple-darwin
            os: macos-latest
            name: mumei-aarch64-apple-darwin
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: mumei-x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            name: mumei-aarch64-unknown-linux-gnu
          # Plan 7: musl static linking target
          # Z3 is built from source via z3/static-link-z3 feature.
          # cmake is required for the Z3 source build.
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: mumei-x86_64-unknown-linux-musl
          # Plan 7: Windows target
          # NOTE: Windows builds depend on vcpkg Z3 compilation which can be
          # slow/flaky. Allowed to fail to avoid blocking other releases.
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: mumei-x86_64-pc-windows-msvc
            allow-failure: true
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.allow-failure || false }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux' && !contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y libz3-dev pkg-config libssl-dev libzstd-dev
          # LLVM 17 from official apt repo
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc > /dev/null
          codename=$(lsb_release -cs)
          echo "deb http://apt.llvm.org/${codename}/ llvm-toolchain-${codename}-17 main" | sudo tee /etc/apt/sources.list.d/llvm-17.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y llvm-17-dev libclang-17-dev libpolly-17-dev
          echo "LLVM_SYS_170_PREFIX=/usr/lib/llvm-17" >> $GITHUB_ENV
          echo "LIBCLANG_PATH=/usr/lib/llvm-17/lib" >> $GITHUB_ENV
      # Plan 7: musl static linking — build inside Alpine Docker container.
      # apt's LLVM/Z3 are compiled against glibc and cannot be linked into a
      # musl binary.  Alpine provides musl-native packages for both.
      - name: Build release binary (musl via Alpine Docker)
        if: contains(matrix.target, 'musl')
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace \
            alpine:3.21 sh -c '
              set -ex
              # Install musl-native build dependencies
              apk add --no-cache \
                gcc g++ musl-dev make cmake pkgconf \
                llvm17-dev llvm17-static clang17-dev \
                z3-dev \
                curl bash perl linux-headers \
                libffi-dev zlib-dev zlib-static \
                zstd-dev zstd-static \
                ncurses-dev libxml2-dev \
                openssl-dev openssl-libs-static

              # Install Rust inside the container
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
              export PATH="/root/.cargo/bin:$PATH"
              rustup target add x86_64-unknown-linux-musl

              # Point llvm-sys / z3-sys at Alpine packages
              export LLVM_SYS_170_PREFIX=/usr/lib/llvm17
              export LIBCLANG_PATH=/usr/lib/llvm17/lib

              # Build fully-static musl binary
              # Use --features z3/static-link-z3 to build Z3 from source with
              # musl-native g++ (Alpine z3-dev headers help cmake find deps)
              cargo build --release --target x86_64-unknown-linux-musl \
                --features z3/static-link-z3
            '
      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install z3 llvm@17
          echo "LLVM_SYS_170_PREFIX=$(brew --prefix llvm@17)" >> $GITHUB_ENV
          echo "LIBCLANG_PATH=$(brew --prefix llvm@17)/lib" >> $GITHUB_ENV
          echo "Z3_SYS_Z3_HEADER=$(brew --prefix z3)/include/z3.h" >> $GITHUB_ENV
          echo "Z3_SYS_Z3_LIB_DIR=$(brew --prefix z3)/lib" >> $GITHUB_ENV
      # Plan 7: Windows dependencies
      # Download LLVM 17 directly from GitHub releases and install to a
      # dedicated directory.  This avoids conflicts with the newer LLVM that
      # may be pre-installed on the runner image (choco --force is unreliable
      # when the existing install was not managed by Chocolatey).
      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Download LLVM 17 installer directly from upstream
          $llvmVersion = "17.0.6"
          $llvmUrl = "https://github.com/llvm/llvm-project/releases/download/llvmorg-$llvmVersion/LLVM-$llvmVersion-win64.exe"
          $installerPath = "$env:RUNNER_TEMP\LLVM-$llvmVersion-win64.exe"
          Write-Host "Downloading LLVM $llvmVersion ..."
          # Suppress progress bar to speed up download in CI
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri $llvmUrl -OutFile $installerPath
          # Install to a clean directory separate from the pre-installed LLVM
          $llvmDir = "C:\LLVM17"
          Write-Host "Installing LLVM $llvmVersion to $llvmDir ..."
          Start-Process -Wait -FilePath $installerPath -ArgumentList "/S /D=$llvmDir"
          # Verify installation
          $llvmConfig = "$llvmDir\bin\llvm-config.exe"
          if (Test-Path $llvmConfig) {
            $ver = & $llvmConfig --version
            Write-Host "LLVM installed: $ver"
          } else {
            Write-Host "WARNING: llvm-config not found at $llvmConfig, listing $llvmDir"
            Get-ChildItem -Path $llvmDir -Recurse -Depth 2 | Select-Object FullName
          }
          echo "LLVM_SYS_170_PREFIX=$llvmDir" >> $env:GITHUB_ENV
          echo "LIBCLANG_PATH=$llvmDir\lib" >> $env:GITHUB_ENV
          # Install Z3 pre-built release (faster than vcpkg source build)
          $z3Version = "4.13.4"
          $z3Archive = "z3-$z3Version-x64-win"
          $z3Url = "https://github.com/Z3Prover/z3/releases/download/z3-$z3Version/$z3Archive.zip"
          $z3Dir = "$env:RUNNER_TEMP\z3"
          Invoke-WebRequest -Uri $z3Url -OutFile "$env:RUNNER_TEMP\z3.zip"
          Expand-Archive -Path "$env:RUNNER_TEMP\z3.zip" -DestinationPath $z3Dir -Force
          $z3Root = (Get-ChildItem -Path $z3Dir -Directory | Select-Object -First 1).FullName
          echo "Z3_SYS_Z3_HEADER=$z3Root\include\z3.h" >> $env:GITHUB_ENV
          echo "Z3_SYS_Z3_LIB_DIR=$z3Root\bin" >> $env:GITHUB_ENV
      - name: Build release binary
        if: "!contains(matrix.target, 'musl')"
        run: cargo build --release --target ${{ matrix.target }}
      # Plan 7: Verify musl binary is statically linked
      - name: Verify static linking (musl)
        if: contains(matrix.target, 'musl')
        run: |
          file target/${{ matrix.target }}/release/mumei
          # Should report "statically linked" or "not a dynamic executable"
          ldd target/${{ matrix.target }}/release/mumei 2>&1 || true
      - name: Package binary + std library (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p release-pkg/std
          cp target/${{ matrix.target }}/release/mumei release-pkg/
          cp -r std/* release-pkg/std/
          cd release-pkg
          tar czf ../${{ matrix.name }}.tar.gz .
      # Plan 7: Windows packaging uses .zip instead of .tar.gz
      - name: Package binary + std library (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-pkg/std
          Copy-Item "target/${{ matrix.target }}/release/mumei.exe" "release-pkg/"
          Copy-Item -Recurse "std/*" "release-pkg/std/"
          Compress-Archive -Path "release-pkg/*" -DestinationPath "${{ matrix.name }}.zip"
      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.tar.gz
      # Plan 7: Upload Windows artifact as .zip
      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
          generate_release_notes: true

  # --- GitHub Pages: install.sh を公開 ---
  deploy-installer:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare GitHub Pages content
        run: |
          mkdir -p gh-pages-dist
          cp scripts/install.sh gh-pages-dist/install.sh
          # Disable Jekyll processing (static site)
          touch gh-pages-dist/.nojekyll
          cat > gh-pages-dist/index.html <<'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Mumei — Mathematical Proof-Driven Programming Language</title>
            <meta name="description" content="Mumei (無銘) is a mathematical proof-driven programming language. Formally verified with Z3, compiled to LLVM IR, transpiled to Rust/Go/TypeScript.">
            <link rel="canonical" href="https://mumei-lang.github.io/mumei/">
            <!-- Open Graph -->
            <meta property="og:title" content="Mumei — Mathematical Proof-Driven Programming Language">
            <meta property="og:description" content="Formally verified with Z3, compiled to LLVM IR, transpiled to Rust/Go/TypeScript.">
            <meta property="og:url" content="https://mumei-lang.github.io/mumei/">
            <meta property="og:type" content="website">
            <meta property="og:site_name" content="Mumei">
            <!-- Twitter Card -->
            <meta name="twitter:card" content="summary">
            <meta name="twitter:title" content="Mumei — Mathematical Proof-Driven Programming Language">
            <meta name="twitter:description" content="Formally verified with Z3, compiled to LLVM IR, transpiled to Rust/Go/TypeScript.">
            <!-- Additional SEO -->
            <meta name="keywords" content="mumei, programming language, formal verification, Z3, LLVM, Rust, Go, TypeScript, proof-driven, mathematical verification">
            <meta name="author" content="mumei-lang">
            <meta name="robots" content="index, follow">
            <link rel="sitemap" type="application/xml" href="/mumei/sitemap.xml">
            <style>
              :root { --bg: #0d1117; --fg: #c9d1d9; --accent: #58a6ff; --code-bg: #161b22; --border: #30363d; }
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--fg); line-height: 1.6; padding: 2rem 1rem; max-width: 720px; margin: 0 auto; }
              h1 { color: #f0f6fc; font-size: 2rem; margin-bottom: 0.25rem; }
              h1 span { font-weight: 300; color: var(--fg); }
              .tagline { color: #8b949e; margin-bottom: 1rem; }
              .github-link { display: inline-flex; align-items: center; gap: 0.5rem; background: var(--code-bg); border: 1px solid var(--border); border-radius: 6px; padding: 0.5rem 1rem; margin-bottom: 2rem; font-size: 0.9rem; color: var(--fg); transition: border-color 0.2s; }
              .github-link:hover { border-color: var(--accent); text-decoration: none; }
              .github-link svg { fill: var(--fg); flex-shrink: 0; }
              h2 { color: #f0f6fc; font-size: 1.25rem; margin: 2rem 0 0.75rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
              pre { background: var(--code-bg); border: 1px solid var(--border); border-radius: 6px; padding: 1rem; overflow-x: auto; margin: 0.75rem 0; position: relative; }
              code { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; font-size: 0.875rem; }
              .copy-btn { position: absolute; top: 0.5rem; right: 0.5rem; background: var(--border); color: var(--fg); border: none; border-radius: 4px; padding: 0.25rem 0.5rem; cursor: pointer; font-size: 0.75rem; }
              .copy-btn:hover { background: #484f58; }
              a { color: var(--accent); text-decoration: none; }
              a:hover { text-decoration: underline; }
              .steps { display: flex; flex-direction: column; gap: 0.5rem; margin: 1rem 0; }
              .step { display: flex; gap: 0.75rem; align-items: baseline; }
              .step-num { background: var(--accent); color: var(--bg); border-radius: 50%; width: 1.5rem; height: 1.5rem; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; flex-shrink: 0; }
              .or { color: #8b949e; text-align: center; margin: 0.5rem 0; font-size: 0.875rem; }
              .footer { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid var(--border); color: #8b949e; font-size: 0.875rem; }
            </style>
          </head>
          <body>
            <h1>Mumei <span>(無銘)</span></h1>
            <p class="tagline">Mathematical Proof-Driven Programming Language — verified by Z3, compiled to LLVM IR, transpiled to Rust/Go/TypeScript.</p>
            <a class="github-link" href="https://github.com/mumei-lang/mumei"><svg height="20" width="20" viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>GitHub</a>

            <h2>Install</h2>
            <pre><code id="cmd-curl">curl -fsSL https://mumei-lang.github.io/mumei/install.sh | bash</code><button class="copy-btn" onclick="navigator.clipboard.writeText(document.getElementById('cmd-curl').textContent)">Copy</button></pre>
            <p class="or">or</p>
            <pre><code id="cmd-brew">brew install mumei-lang/mumei/mumei</code><button class="copy-btn" onclick="navigator.clipboard.writeText(document.getElementById('cmd-brew').textContent)">Copy</button></pre>
            <p style="color:#8b949e; font-size:0.875rem; margin-top:0.5rem;">No Rust toolchain required. Detects OS/arch automatically.</p>

            <h2>Quick Start</h2>
            <div class="steps">
              <div class="step"><span class="step-num">1</span><span>Create a project</span></div>
            </div>
            <pre><code>mumei init my_app && cd my_app</code></pre>
            <div class="steps">
              <div class="step"><span class="step-num">2</span><span>Build (verify + codegen + transpile)</span></div>
            </div>
            <pre><code>mumei build src/main.mm -o dist/output</code></pre>
            <div class="steps">
              <div class="step"><span class="step-num">3</span><span>Check your environment</span></div>
            </div>
            <pre><code>mumei inspect</code></pre>

            <h2>Links</h2>
            <ul style="list-style:none; padding:0;">
              <li><a href="https://github.com/mumei-lang/mumei">GitHub Repository</a></li>
              <li><a href="https://github.com/mumei-lang/mumei/releases">Releases & Pre-built Binaries</a></li>
              <li><a href="https://github.com/mumei-lang/mumei/blob/develop/docs/LANGUAGE.md">Language Reference</a></li>
              <li><a href="https://github.com/mumei-lang/mumei/blob/develop/docs/STDLIB.md">Standard Library</a></li>
            </ul>

            <div class="footer">
              <p>MIT License &middot; <a href="https://github.com/mumei-lang/mumei">mumei-lang/mumei</a></p>
            </div>
          </body>
          </html>
          HTMLEOF
      - name: Generate sitemap.xml and robots.txt
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          cat > gh-pages-dist/sitemap.xml <<SITEMAPEOF
          <?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
            <url>
              <loc>https://mumei-lang.github.io/mumei/</loc>
              <lastmod>${TODAY}</lastmod>
              <changefreq>monthly</changefreq>
              <priority>1.0</priority>
            </url>
            <url>
              <loc>https://mumei-lang.github.io/mumei/install.sh</loc>
              <lastmod>${TODAY}</lastmod>
              <changefreq>monthly</changefreq>
              <priority>0.5</priority>
            </url>
          </urlset>
          SITEMAPEOF
          cat > gh-pages-dist/robots.txt <<'ROBOTSEOF'
          User-agent: *
          Allow: /
          Sitemap: https://mumei-lang.github.io/mumei/sitemap.xml
          ROBOTSEOF
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-dist
          publish_branch: gh-pages

  # --- Homebrew Formula 自動更新 ---
  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    # Homebrew tap の更新失敗でリリース全体を失敗にしない
    continue-on-error: true
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Validate HOMEBREW_TAP_TOKEN
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${HOMEBREW_TAP_TOKEN}" ]; then
            echo "::error::HOMEBREW_TAP_TOKEN secret is not set. Please configure a valid Personal Access Token with 'contents:write' permission for mumei-lang/homebrew-mumei."
            exit 1
          fi
          # トークンの読み取り権限を検証
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: token ${HOMEBREW_TAP_TOKEN}" https://api.github.com/repos/mumei-lang/homebrew-mumei)
          if [ "${HTTP_STATUS}" != "200" ]; then
            echo "::error::HOMEBREW_TAP_TOKEN is invalid or does not have access to mumei-lang/homebrew-mumei (HTTP ${HTTP_STATUS}). Please update the secret with a valid token."
            exit 1
          fi
          echo "Token validation passed."
      - name: Compute SHA256 checksums
        id: sha256
        run: |
          for f in artifacts/*/mumei-*.tar.gz artifacts/*/mumei-*.zip; do
            [ -f "$f" ] || continue
            base=$(basename "$f")
            name="${base%%.*}"
            sha=$(sha256sum "$f" | awk '{print $1}')
            echo "${name}_sha256=${sha}" >> "$GITHUB_OUTPUT"
            echo "${name}: ${sha}"
          done
      - name: Checkout homebrew-mumei
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/mumei-lang/homebrew-mumei.git" homebrew-mumei 2>/dev/null || {
            mkdir -p homebrew-mumei
            cd homebrew-mumei
            git init -b main
            git remote add origin "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/mumei-lang/homebrew-mumei.git"
          }
      - name: Generate Homebrew Formula
        env:
          VERSION: ${{ github.ref_name }}
          SHA_MACOS_ARM: ${{ steps.sha256.outputs['mumei-aarch64-apple-darwin_sha256'] }}
          SHA_MACOS_X86: ${{ steps.sha256.outputs['mumei-x86_64-apple-darwin_sha256'] }}
          SHA_LINUX_ARM: ${{ steps.sha256.outputs['mumei-aarch64-unknown-linux-gnu_sha256'] }}
          SHA_LINUX_X86: ${{ steps.sha256.outputs['mumei-x86_64-unknown-linux-gnu_sha256'] }}
        run: |
          TAG="${VERSION}"
          VER="${VERSION#v}"
          mkdir -p homebrew-mumei/Formula
          cat > homebrew-mumei/Formula/mumei.rb <<FORMULA_END
          # Homebrew Formula for Mumei — auto-generated by release workflow
          class Mumei < Formula
            desc "Mathematical Proof-Driven Programming Language — formally verified with Z3"
            homepage "https://github.com/mumei-lang/mumei"
            license "MIT"
            version "${VER}"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/mumei-lang/mumei/releases/download/${TAG}/mumei-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_MACOS_ARM}"
              else
                url "https://github.com/mumei-lang/mumei/releases/download/${TAG}/mumei-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_MACOS_X86}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/mumei-lang/mumei/releases/download/${TAG}/mumei-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LINUX_ARM}"
              else
                url "https://github.com/mumei-lang/mumei/releases/download/${TAG}/mumei-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LINUX_X86}"
              end
            end

            depends_on "z3"
            depends_on "llvm@17"

            def install
              bin.install "mumei"
              (share/"mumei/std").install Dir["std/*"]

              env_script = <<~EOS
                export MUMEI_STD_PATH="#{share}/mumei/std"
              EOS
              (etc/"mumei").mkpath
              (etc/"mumei/env.sh").write env_script
            end

            def caveats
              <<~EOS
                The Mumei standard library has been installed to:
                  #{share}/mumei/std

                To use it, add the following to your shell profile:
                  export MUMEI_STD_PATH="#{share}/mumei/std"

                Or source the environment file:
                  source #{etc}/mumei/env.sh
              EOS
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/mumei --version")
            end
          end
          FORMULA_END
      - name: Push formula to homebrew-mumei
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          cd homebrew-mumei
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # push 前にリモート URL へトークンを明示的に設定
          git remote set-url origin "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/mumei-lang/homebrew-mumei.git"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update Mumei formula to ${{ github.ref_name }}"
          # Push to main (handles both empty and existing repos)
          git push origin HEAD:main
