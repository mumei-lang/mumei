name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run: build+verify only, skip GitHub Release upload"
        type: boolean
        default: true
permissions:
  contents: write
  pages: write

# z3-sys v0.8.1 vendors a Z3 CMake project with an old minimum policy version.
env:
  CMAKE_POLICY_VERSION_MINIMUM: "3.5"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-15-intel
            name: mumei-x86_64-apple-darwin
          - target: aarch64-apple-darwin
            os: macos-latest
            name: mumei-aarch64-apple-darwin
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: mumei-x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            name: mumei-aarch64-unknown-linux-gnu
          # Plan 7: musl static linking target
          # Z3 is built from source via z3/static-link-z3 feature.
          # cmake is required for the Z3 source build.
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: mumei-x86_64-unknown-linux-musl
          # Plan 7: Windows target (LLVM built from source, Z3 prebuilt)
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            name: mumei-x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux' && !contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y libz3-dev pkg-config libssl-dev libzstd-dev
          # LLVM 17 from official apt repo
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc > /dev/null
          codename=$(lsb_release -cs)
          echo "deb http://apt.llvm.org/${codename}/ llvm-toolchain-${codename}-17 main" | sudo tee /etc/apt/sources.list.d/llvm-17.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y llvm-17-dev libclang-17-dev libpolly-17-dev
          echo "LLVM_SYS_170_PREFIX=/usr/lib/llvm-17" >> $GITHUB_ENV
          echo "LIBCLANG_PATH=/usr/lib/llvm-17/lib" >> $GITHUB_ENV
      # Plan 7: musl static linking — build inside Alpine Docker container.
      # apt's LLVM/Z3 are compiled against glibc and cannot be linked into a
      # musl binary.  Alpine provides musl-native packages for both.
      #
      # Host == target (both x86_64-unknown-linux-musl). Build scripts such as
      # the one in z3-sys use bindgen, which dlopens libclang at build time.
      # Fully static musl binaries cannot dlopen, so build scripts must be
      # linked dynamically while the final binary stays statically linked.
      #
      # Cargo's [host]/[target.*] rustflags split requires the nightly
      # `-Zhost-config` + `-Ztarget-applies-to-host` feature, so we install a
      # nightly toolchain solely for this step. Stable is still used for
      # resolving crates (Cargo.lock stays stable-compatible).
      - name: Build release binary (musl via Alpine Docker)
        if: contains(matrix.target, 'musl')
        run: |
          docker run --rm \
            -e CMAKE_POLICY_VERSION_MINIMUM \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace \
            alpine:3.21 sh -c '
              set -ex
              # Install musl-native build dependencies
              apk add --no-cache \
                gcc g++ musl-dev make cmake pkgconf \
                llvm17-dev llvm17-static clang17-dev clang17-static \
                z3-dev \
                curl bash perl linux-headers file \
                libffi-dev zlib-dev zlib-static \
                zstd-dev zstd-static \
                ncurses-dev libxml2-dev libxml2-static \
                openssl-dev openssl-libs-static

              # Install Rust inside the container (stable + nightly).
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs \
                | sh -s -- -y --default-toolchain stable --profile minimal
              export PATH="/root/.cargo/bin:$PATH"
              rustup toolchain install nightly --profile minimal
              rustup target add x86_64-unknown-linux-musl
              rustup target add x86_64-unknown-linux-musl --toolchain nightly

              # Point llvm-sys / z3-sys at Alpine musl-native packages.
              export LLVM_SYS_170_PREFIX=/usr/lib/llvm17
              export LIBCLANG_PATH=/usr/lib/llvm17/lib

              # Cargo config: split host (build-scripts / dynamic for dlopen)
              # from target (final binary / +crt-static).
              mkdir -p .cargo
              {
                printf "[unstable]\n"
                printf "host-config = true\n"
                printf "target-applies-to-host = false\n\n"
                printf "[host]\n"
                printf "rustflags = [\"-C\", \"target-feature=-crt-static\"]\n\n"
                printf "[target.x86_64-unknown-linux-musl]\n"
                printf "rustflags = [\"-C\", \"target-feature=+crt-static\"]\n"
              } > .cargo/config.toml
              cat .cargo/config.toml

              # Build with nightly-only flags; the resulting binary is still
              # ABI-compatible with stable-produced code.
              cargo +nightly build -Zhost-config -Ztarget-applies-to-host \
                --release \
                --target x86_64-unknown-linux-musl \
                --features static-link-z3

              rm -f .cargo/config.toml
            '
      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install z3 llvm@17
          echo "LLVM_SYS_170_PREFIX=$(brew --prefix llvm@17)" >> $GITHUB_ENV
          echo "LIBCLANG_PATH=$(brew --prefix llvm@17)/lib" >> $GITHUB_ENV
          echo "Z3_SYS_Z3_HEADER=$(brew --prefix z3)/include/z3.h" >> $GITHUB_ENV
          echo "Z3_SYS_Z3_LIB_DIR=$(brew --prefix z3)/lib" >> $GITHUB_ENV
      # Plan 7: Windows dependencies
      # Use the official LLVM 17 Windows installer instead of building LLVM
      # from source. The installer provides LLVM-C.dll/LLVM-C.lib for llvm-sys
      # and libclang.dll for bindgen; a tiny llvm-config shim supplies the
      # metadata llvm-sys expects at build time.
      - name: Cache LLVM 17 tools (Windows)
        if: runner.os == 'Windows'
        id: cache-llvm-win
        uses: actions/cache@v4
        with:
          path: C:\LLVM17
          key: llvm-17.0.6-win64-msvc-prebuilt-tools-v1
      - name: Install LLVM 17 tools (Windows)
        if: runner.os == 'Windows' && steps.cache-llvm-win.outputs.cache-hit != 'true'
        timeout-minutes: 30
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $llvmVersion = "17.0.6"
          $releaseBase = "https://github.com/llvm/llvm-project/releases/download/llvmorg-$llvmVersion"
          $toolsUrl = "$releaseBase/LLVM-$llvmVersion-win64.exe"
          $toolsInstallerPath = "$env:RUNNER_TEMP\llvm-tools.exe"
          $llvmDir = "C:\LLVM17"
          $maxAttempts = 5

          Write-Host "Downloading LLVM $llvmVersion Windows tools..."
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            try {
              Invoke-WebRequest -Uri $toolsUrl -OutFile $toolsInstallerPath -TimeoutSec 600
              if ((Get-Item $toolsInstallerPath).Length -lt 10MB) {
                throw "Downloaded LLVM installer is suspiciously small"
              }
              Write-Host "LLVM Windows tools downloaded on attempt $attempt"
              break
            } catch {
              Write-Host "LLVM tools download attempt $attempt failed: $_"
              if ($attempt -eq $maxAttempts) {
                throw "Failed to download LLVM Windows tools after $maxAttempts attempts: $_"
              }
              Remove-Item -Force $toolsInstallerPath -ErrorAction SilentlyContinue
              $sleepSeconds = [math]::Pow(2, $attempt) * 5
              Write-Host "Retrying in $sleepSeconds seconds..."
              Start-Sleep -Seconds $sleepSeconds
            }
          }

          Write-Host "Extracting LLVM Windows tools..."
          $sevenZip = (Get-Command 7z -ErrorAction SilentlyContinue).Source
          if (-not $sevenZip) {
            $sevenZip = "$env:ProgramFiles\7-Zip\7z.exe"
          }
          if (-not (Test-Path $sevenZip)) {
            Write-Error "7-Zip not found; cannot extract LLVM Windows tools"
            exit 1
          }
          Remove-Item -Recurse -Force $llvmDir -ErrorAction SilentlyContinue
          & $sevenZip x $toolsInstallerPath "-o$llvmDir" -y | Out-Null

          New-Item -ItemType Directory -Force -Path "$llvmDir\include\llvm-c" | Out-Null
          @'
          #ifndef LLVM_C_TARGET_H
          #define LLVM_C_TARGET_H
          #ifdef __cplusplus
          extern "C" {
          #endif
          typedef int LLVMBool;
          void LLVMInitializeX86TargetInfo(void);
          void LLVMInitializeX86Target(void);
          void LLVMInitializeX86TargetMC(void);
          void LLVMInitializeX86AsmPrinter(void);
          void LLVMInitializeX86AsmParser(void);
          void LLVMInitializeX86Disassembler(void);
          static inline void LLVMInitializeAllTargetInfos(void) { LLVMInitializeX86TargetInfo(); }
          static inline void LLVMInitializeAllTargets(void) { LLVMInitializeX86Target(); }
          static inline void LLVMInitializeAllTargetMCs(void) { LLVMInitializeX86TargetMC(); }
          static inline void LLVMInitializeAllAsmPrinters(void) { LLVMInitializeX86AsmPrinter(); }
          static inline void LLVMInitializeAllAsmParsers(void) { LLVMInitializeX86AsmParser(); }
          static inline void LLVMInitializeAllDisassemblers(void) { LLVMInitializeX86Disassembler(); }
          static inline LLVMBool LLVMInitializeNativeTarget(void) { LLVMInitializeX86TargetInfo(); LLVMInitializeX86Target(); LLVMInitializeX86TargetMC(); return 0; }
          static inline LLVMBool LLVMInitializeNativeAsmPrinter(void) { LLVMInitializeX86AsmPrinter(); return 0; }
          static inline LLVMBool LLVMInitializeNativeAsmParser(void) { LLVMInitializeX86AsmParser(); return 0; }
          static inline LLVMBool LLVMInitializeNativeDisassembler(void) { LLVMInitializeX86Disassembler(); return 0; }
          #ifdef __cplusplus
          }
          #endif
          #endif
          '@ | Set-Content -Encoding ASCII "$llvmDir\include\llvm-c\Target.h"

          $shimSource = "$env:RUNNER_TEMP\llvm-config-shim.rs"
          @'
          use std::{env, process};

          fn main() {
              let args: Vec<String> = env::args().skip(1).collect();
              let exe = env::current_exe().expect("current exe");
              let prefix = exe.parent().and_then(|p| p.parent()).expect("LLVM prefix");
              let include = prefix.join("include");
              let lib = prefix.join("lib");
              let has = |flag: &str| args.iter().any(|arg| arg == flag);

              if has("--version") {
                  println!("17.0.6");
              } else if has("--cflags") {
                  println!("/I{}", include.display());
              } else if has("--libdir") {
                  println!("{}", lib.display());
              } else if has("--libnames") {
                  println!("LLVM-C.lib");
              } else if has("--system-libs") {
                  println!("");
              } else if has("--build-mode") {
                  println!("Release");
              } else if has("--includedir") {
                  println!("{}", include.display());
              } else if has("--prefix") {
                  println!("{}", prefix.display());
              } else {
                  eprintln!("unsupported llvm-config args: {:?}", args);
                  process::exit(1);
              }
          }
          '@ | Set-Content -Encoding UTF8 $shimSource
          rustc $shimSource -o "$llvmDir\bin\llvm-config.exe"

          $requiredFiles = @(
            "$llvmDir\bin\LLVM-C.dll",
            "$llvmDir\bin\libclang.dll",
            "$llvmDir\lib\LLVM-C.lib",
            "$llvmDir\include\llvm-c\Target.h",
            "$llvmDir\bin\llvm-config.exe"
          )
          foreach ($file in $requiredFiles) {
            if (-not (Test-Path $file)) {
              Write-Error "Required LLVM file not found: $file"
              exit 1
            }
          }
          & "$llvmDir\bin\llvm-config.exe" --version
          & "$llvmDir\bin\llvm-config.exe" --libnames --link-static
          Write-Host "LLVM Windows tools installed to $llvmDir"
      - name: Set LLVM & Z3 environment variables (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $llvmDir = "C:\LLVM17"
          $llvmConfig = "$llvmDir\bin\llvm-config.exe"
          $llvmCDll = "$llvmDir\bin\LLVM-C.dll"
          $llvmCLib = "$llvmDir\lib\LLVM-C.lib"
          $libclang = "$llvmDir\bin\libclang.dll"
          $targetHeader = "$llvmDir\include\llvm-c\Target.h"
          if ((Test-Path $llvmConfig) -and (Test-Path $llvmCDll) -and (Test-Path $llvmCLib) -and (Test-Path $libclang) -and (Test-Path $targetHeader)) {
            Write-Host "LLVM prebuilt files found at $llvmDir"
          } else {
            Write-Error "LLVM prebuilt files not found — LLVM setup may have failed"
            Write-Host "llvm-config.exe: $llvmConfig exists=$(Test-Path $llvmConfig)"
            Write-Host "LLVM-C.dll: $llvmCDll exists=$(Test-Path $llvmCDll)"
            Write-Host "LLVM-C.lib: $llvmCLib exists=$(Test-Path $llvmCLib)"
            Write-Host "libclang.dll: $libclang exists=$(Test-Path $libclang)"
            Write-Host "Target.h: $targetHeader exists=$(Test-Path $targetHeader)"
            exit 1
          }
          echo "LLVM_SYS_170_PREFIX=$llvmDir" >> $env:GITHUB_ENV
          echo "LIBCLANG_PATH=$llvmDir\bin" >> $env:GITHUB_ENV
          echo "PATH=$llvmDir\bin;$env:PATH" >> $env:GITHUB_ENV
          # Install Z3 pre-built release (faster than vcpkg source build)
          $z3Version = "4.13.4"
          $z3Archive = "z3-$z3Version-x64-win"
          $z3Url = "https://github.com/Z3Prover/z3/releases/download/z3-$z3Version/$z3Archive.zip"
          $z3Dir = "$env:RUNNER_TEMP\z3"
          $z3ZipPath = "$env:RUNNER_TEMP\z3.zip"
          $maxAttempts = 5
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            try {
              Invoke-WebRequest -Uri $z3Url -OutFile $z3ZipPath -TimeoutSec 300
              if ((Get-Item $z3ZipPath).Length -lt 1MB) {
                throw "Downloaded Z3 archive is suspiciously small"
              }
              Write-Host "Z3 downloaded on attempt $attempt"
              break
            } catch {
              Write-Host "Z3 download attempt $attempt failed: $_"
              if ($attempt -eq $maxAttempts) {
                throw "Failed to download Z3 after $maxAttempts attempts: $_"
              }
              Remove-Item -Force $z3ZipPath -ErrorAction SilentlyContinue
              $sleepSeconds = [math]::Pow(2, $attempt) * 5
              Write-Host "Retrying in $sleepSeconds seconds..."
              Start-Sleep -Seconds $sleepSeconds
            }
          }
          Expand-Archive -Path $z3ZipPath -DestinationPath $z3Dir -Force
          $z3Root = Join-Path $z3Dir $z3Archive
          $z3LibDir = Join-Path $z3Root "bin"
          $z3Header = Join-Path $z3Root "include\z3.h"
          if (-not (Test-Path $z3Header)) {
            Write-Error "Z3 header not found at $z3Header"
            exit 1
          }
          if (-not (Test-Path (Join-Path $z3LibDir "libz3.lib"))) {
            Write-Error "Z3 library not found in $z3LibDir"
            exit 1
          }
          echo "Z3_SYS_Z3_HEADER=$z3Header" >> $env:GITHUB_ENV
          echo "Z3_SYS_Z3_LIB_DIR=$z3LibDir" >> $env:GITHUB_ENV
          # z3-sys does not emit cargo:rustc-link-search for the Z3 lib
          # directory in non-static mode; add it to the linker search path
          # so the MSVC linker can find libz3.lib. Include LLVM-C.lib too.
          $currentLib = if ($env:LIB) { $env:LIB } else { "" }
          echo "LIB=$llvmDir\lib;$z3LibDir;$currentLib" >> $env:GITHUB_ENV
          # Save z3Root for later DLL copy step
          echo "Z3_ROOT=$z3Root" >> $env:GITHUB_ENV
      - name: Build release binary (Linux non-musl)
        if: runner.os == 'Linux' && !contains(matrix.target, 'musl')
        run: cargo build --release --target ${{ matrix.target }} --features static-link-z3
      - name: Build release binary (macOS)
        if: runner.os == 'macOS'
        run: cargo build --release --target ${{ matrix.target }}
      - name: Build release binary (Windows)
        if: runner.os == 'Windows'
        run: cargo build --release --target ${{ matrix.target }}
      # Plan 7: Verify musl binary and record its dynamic dependencies.
      #
      # The `z3/static-link-z3` feature links libz3 statically. The musl libc
      # itself uses `+crt-static`, so the final binary has no required
      # dependency on the Alpine dynamic musl loader. A handful of system
      # libraries used by LLVM (libffi, libz, libzstd) are still dynamically
      # loaded because Alpine does not ship static variants of all of them;
      # Alpine-based consumers have these installed by default.
      - name: Verify musl binary
        if: contains(matrix.target, 'musl')
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace \
            alpine:3.21 sh -c '
              apk add --no-cache file libffi libzstd zlib >/dev/null
              bin=target/x86_64-unknown-linux-musl/release/mumei
              file "$bin"
              ldd "$bin" 2>&1 || true
              "$bin" --version
            '
      # SI-5 Phase 3-C: generate per-module proof certificates so downstream
      # consumers (homebrew-mumei, vetted imports) can verify std atoms
      # against a tagged, versioned certificate bundle.  Failures are
      # tolerated per-file — a broken module should not block the release.
      - name: Generate std/ proof certificates (Unix)
        if: runner.os != 'Windows' && !contains(matrix.target, 'musl')
        run: |
          mkdir -p std/certs
          find std -type f -name '*.mm' -print0 | while IFS= read -r -d '' f; do
            rel="${f#std/}"
            stem="${rel%.mm}"
            outdir="std/certs/$(dirname "$stem")"
            mkdir -p "$outdir"
            out="std/certs/${stem}.proof.json"
            ./target/${{ matrix.target }}/release/mumei verify --proof-cert \
              --output "$out" "$f" \
              || echo "::warning::verify failed for $f (continuing)"
          done
      - name: Bundle std/ proof certificates (Unix)
        if: runner.os != 'Windows' && !contains(matrix.target, 'musl')
        run: |
          python3 scripts/bundle_std_certs.py \
            --certs-dir std/certs \
            --output std-proof-bundle.json \
            --mumei-version "${GITHUB_REF_NAME#v}"
      - name: Package binary + std library (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p release-pkg/std
          cp target/${{ matrix.target }}/release/mumei release-pkg/
          # Copy std/ but exclude certs/ — raw per-module .proof.json files
          # are intermediate artefacts; the aggregated std-proof-bundle.json
          # (copied below) is the only certificate consumers need.
          rsync -a --exclude='certs' std/ release-pkg/std/
          # SI-5 Phase 3-C: include the proof bundle in every Unix tarball
          # (when present — musl & Alpine targets don't run the cert step).
          if [ -f std-proof-bundle.json ]; then
            cp std-proof-bundle.json release-pkg/
          fi
          cd release-pkg
          tar czf ../${{ matrix.name }}.tar.gz .
      # Plan 7: Windows packaging uses .zip instead of .tar.gz
      - name: Package binary + std library (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-pkg/std
          Copy-Item "target/${{ matrix.target }}/release/mumei.exe" "release-pkg/"
          # Copy std/ but exclude certs/ (intermediate proof artefacts) to
          # match Unix packaging which uses rsync --exclude='certs'.
          Copy-Item -Recurse "std/*" "release-pkg/std/"
          if (Test-Path "release-pkg/std/certs") {
            Remove-Item -Recurse -Force "release-pkg/std/certs"
          }
          # Include required runtime DLLs so the binary can start outside CI
          $llvmCDll = "$env:LLVM_SYS_170_PREFIX\bin\LLVM-C.dll"
          if (Test-Path $llvmCDll) {
            Copy-Item $llvmCDll "release-pkg/"
            Write-Host "Included LLVM-C.dll in release package"
          } else {
            Write-Warning "LLVM-C.dll not found at $llvmCDll — runtime may fail"
          }
          $z3Bin = "$env:Z3_ROOT\bin\libz3.dll"
          if (Test-Path $z3Bin) {
            Copy-Item $z3Bin "release-pkg/"
            Write-Host "Included libz3.dll in release package"
          } else {
            Write-Warning "libz3.dll not found at $z3Bin — runtime may fail"
          }
          Compress-Archive -Path "release-pkg/*" -DestinationPath "${{ matrix.name }}.zip"
      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.tar.gz
      # Plan 7: Upload Windows artifact as .zip
      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    # Skip the GitHub Release upload on workflow_dispatch dry runs so the
    # Windows / musl build jobs can be validated without cutting a tag.
    if: github.event_name != 'workflow_dispatch' || inputs.dry_run != true
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
          generate_release_notes: true

  # --- GitHub Pages: install.sh を公開 ---
  deploy-installer:
    needs: release
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || inputs.dry_run != true
    steps:
      - uses: actions/checkout@v4
      - name: Prepare GitHub Pages content
        run: |
          mkdir -p gh-pages-dist
          cp scripts/install.sh gh-pages-dist/install.sh
          # Disable Jekyll processing (static site)
          touch gh-pages-dist/.nojekyll
          cat > gh-pages-dist/index.html <<'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Mumei — Mathematical Proof-Driven Programming Language</title>
            <meta name="description" content="Mumei (無銘) is a mathematical proof-driven programming language. Formally verified with Z3, compiled to LLVM IR.">
            <link rel="canonical" href="https://mumei-lang.github.io/mumei/">
            <!-- Open Graph -->
            <meta property="og:title" content="Mumei — Mathematical Proof-Driven Programming Language">
            <meta property="og:description" content="Formally verified with Z3, compiled to LLVM IR.">
            <meta property="og:url" content="https://mumei-lang.github.io/mumei/">
            <meta property="og:type" content="website">
            <meta property="og:site_name" content="Mumei">
            <!-- Twitter Card -->
            <meta name="twitter:card" content="summary">
            <meta name="twitter:title" content="Mumei — Mathematical Proof-Driven Programming Language">
            <meta name="twitter:description" content="Formally verified with Z3, compiled to LLVM IR.">
            <!-- Additional SEO -->
            <meta name="keywords" content="mumei, programming language, formal verification, Z3, LLVM, proof-driven, mathematical verification">
            <meta name="author" content="mumei-lang">
            <meta name="robots" content="index, follow">
            <link rel="sitemap" type="application/xml" href="/mumei/sitemap.xml">
            <style>
              :root { --bg: #0d1117; --fg: #c9d1d9; --accent: #58a6ff; --code-bg: #161b22; --border: #30363d; }
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--fg); line-height: 1.6; padding: 2rem 1rem; max-width: 720px; margin: 0 auto; }
              h1 { color: #f0f6fc; font-size: 2rem; margin-bottom: 0.25rem; }
              h1 span { font-weight: 300; color: var(--fg); }
              .tagline { color: #8b949e; margin-bottom: 1rem; }
              .github-link { display: inline-flex; align-items: center; gap: 0.5rem; background: var(--code-bg); border: 1px solid var(--border); border-radius: 6px; padding: 0.5rem 1rem; margin-bottom: 2rem; font-size: 0.9rem; color: var(--fg); transition: border-color 0.2s; }
              .github-link:hover { border-color: var(--accent); text-decoration: none; }
              .github-link svg { fill: var(--fg); flex-shrink: 0; }
              h2 { color: #f0f6fc; font-size: 1.25rem; margin: 2rem 0 0.75rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
              pre { background: var(--code-bg); border: 1px solid var(--border); border-radius: 6px; padding: 1rem; overflow-x: auto; margin: 0.75rem 0; position: relative; }
              code { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; font-size: 0.875rem; }
              .copy-btn { position: absolute; top: 0.5rem; right: 0.5rem; background: var(--border); color: var(--fg); border: none; border-radius: 4px; padding: 0.25rem 0.5rem; cursor: pointer; font-size: 0.75rem; }
              .copy-btn:hover { background: #484f58; }
              a { color: var(--accent); text-decoration: none; }
              a:hover { text-decoration: underline; }
              .steps { display: flex; flex-direction: column; gap: 0.5rem; margin: 1rem 0; }
              .step { display: flex; gap: 0.75rem; align-items: baseline; }
              .step-num { background: var(--accent); color: var(--bg); border-radius: 50%; width: 1.5rem; height: 1.5rem; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; flex-shrink: 0; }
              .or { color: #8b949e; text-align: center; margin: 0.5rem 0; font-size: 0.875rem; }
              .footer { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid var(--border); color: #8b949e; font-size: 0.875rem; }
            </style>
          </head>
          <body>
            <h1>Mumei <span>(無銘)</span></h1>
            <p class="tagline">Mathematical Proof-Driven Programming Language — verified by Z3, compiled to LLVM IR.</p>
            <a class="github-link" href="https://github.com/mumei-lang/mumei"><svg height="20" width="20" viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>GitHub</a>

            <h2>Install</h2>
            <pre><code id="cmd-curl">curl -fsSL https://mumei-lang.github.io/mumei/install.sh | bash</code><button class="copy-btn" onclick="navigator.clipboard.writeText(document.getElementById('cmd-curl').textContent)">Copy</button></pre>
            <p class="or">or</p>
            <pre><code id="cmd-brew">brew install mumei-lang/mumei/mumei</code><button class="copy-btn" onclick="navigator.clipboard.writeText(document.getElementById('cmd-brew').textContent)">Copy</button></pre>
            <p style="color:#8b949e; font-size:0.875rem; margin-top:0.5rem;">No Rust toolchain required. Detects OS/arch automatically. By default the latest tagged release is installed; pin a specific version with <code>--version v0.5.6</code>.</p>

            <h2>Quick Start</h2>
            <div class="steps">
              <div class="step"><span class="step-num">1</span><span>Create a project</span></div>
            </div>
            <pre><code>mumei init my_app && cd my_app</code></pre>
            <div class="steps">
              <div class="step"><span class="step-num">2</span><span>Build (verify + codegen)</span></div>
            </div>
            <pre><code>mumei build src/main.mm -o dist/output</code></pre>
            <div class="steps">
              <div class="step"><span class="step-num">3</span><span>Check your environment</span></div>
            </div>
            <pre><code>mumei inspect</code></pre>

            <h2>Links</h2>
            <ul style="list-style:none; padding:0;">
              <li><a href="https://github.com/mumei-lang/mumei">GitHub Repository</a></li>
              <li><a href="https://github.com/mumei-lang/mumei/releases">Releases &amp; Pre-built Binaries</a></li>
              <li><a href="https://github.com/mumei-lang/mumei/blob/develop/docs/LANGUAGE.md">Language Reference</a></li>
              <li><a href="https://github.com/mumei-lang/mumei/blob/develop/docs/STDLIB.md">Standard Library</a></li>
              <li><a href="https://github.com/mumei-lang/mumei/blob/develop/docs/CHANGELOG.md">Changelog</a></li>
              <li><a href="https://github.com/mumei-lang/mumei-agent">mumei-agent (AI + Z3 self-healing loop)</a></li>
            </ul>

            <div class="footer">
              <p>Apache-2.0 License &middot; <a href="https://github.com/mumei-lang/mumei">mumei-lang/mumei</a></p>
            </div>
          </body>
