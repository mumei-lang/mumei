          HTMLEOF
      - name: Generate sitemap.xml and robots.txt
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          cat > gh-pages-dist/sitemap.xml <<SITEMAPEOF
          <?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
            <url>
              <loc>https://mumei-lang.github.io/mumei/</loc>
              <lastmod>${TODAY}</lastmod>
              <changefreq>monthly</changefreq>
              <priority>1.0</priority>
            </url>
            <url>
              <loc>https://mumei-lang.github.io/mumei/install.sh</loc>
              <lastmod>${TODAY}</lastmod>
              <changefreq>monthly</changefreq>
              <priority>0.5</priority>
            </url>
          </urlset>
          SITEMAPEOF
          cat > gh-pages-dist/robots.txt <<'ROBOTSEOF'
          User-agent: *
          Allow: /
          Sitemap: https://mumei-lang.github.io/mumei/sitemap.xml
          ROBOTSEOF
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-dist
          publish_branch: gh-pages

  # --- Homebrew Formula auto-update ---
  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || inputs.dry_run != true
    steps:
      - name: Check HOMEBREW_TAP_TOKEN
        id: homebrew-token
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${HOMEBREW_TAP_TOKEN}" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN is not set; skipping Homebrew tap update. GitHub Release creation is already complete."
            echo "should_update=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer ${HOMEBREW_TAP_TOKEN}" https://api.github.com/repos/mumei-lang/homebrew-mumei)
          if [ "${HTTP_STATUS}" != "200" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN is invalid or cannot access mumei-lang/homebrew-mumei (HTTP ${HTTP_STATUS}); skipping Homebrew tap update. GitHub Release creation is already complete."
            echo "should_update=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "should_update=true" >> "$GITHUB_OUTPUT"
          echo "Token validation passed."
      - name: Skip Homebrew Formula update
        if: steps.homebrew-token.outputs.should_update != 'true'
        run: echo "Homebrew Formula update skipped; release artifacts remain published."
      - name: Checkout mumei (for generate_formula.py)
        if: steps.homebrew-token.outputs.should_update == 'true'
        uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        if: steps.homebrew-token.outputs.should_update == 'true'
        with:
          path: artifacts
      - name: Compute SHA256 checksums
        if: steps.homebrew-token.outputs.should_update == 'true'
        id: sha256
        run: |
          for f in artifacts/*/mumei-*.tar.gz artifacts/*/mumei-*.zip; do
            [ -f "$f" ] || continue
            base=$(basename "$f")
            name="${base%%.*}"
            sha=$(sha256sum "$f" | awk '{print $1}')
            echo "${name}_sha256=${sha}" >> "$GITHUB_OUTPUT"
            echo "${name}: ${sha}"
          done
      - name: Checkout homebrew-mumei
        if: steps.homebrew-token.outputs.should_update == 'true'
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/mumei-lang/homebrew-mumei.git" homebrew-mumei 2>/dev/null || {
            mkdir -p homebrew-mumei
            cd homebrew-mumei
            git init -b main
            git remote add origin "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/mumei-lang/homebrew-mumei.git"
          }
      - name: Generate Homebrew Formula
        if: steps.homebrew-token.outputs.should_update == 'true'
        env:
          VERSION: ${{ github.ref_name }}
          SHA_MACOS_ARM: ${{ steps.sha256.outputs['mumei-aarch64-apple-darwin_sha256'] }}
          SHA_MACOS_X86: ${{ steps.sha256.outputs['mumei-x86_64-apple-darwin_sha256'] }}
          SHA_LINUX_ARM: ${{ steps.sha256.outputs['mumei-aarch64-unknown-linux-gnu_sha256'] }}
          SHA_LINUX_X86: ${{ steps.sha256.outputs['mumei-x86_64-unknown-linux-gnu_sha256'] }}
        run: |
          mkdir -p homebrew-mumei/Formula
          python3 scripts/generate_formula.py \
            --version "${VERSION}" \
            --sha-x86-mac "${SHA_MACOS_X86}" \
            --sha-arm-mac "${SHA_MACOS_ARM}" \
            --sha-x86-linux "${SHA_LINUX_X86}" \
            --sha-arm-linux "${SHA_LINUX_ARM}" \
            --output homebrew-mumei/Formula/mumei.rb
      - name: Push formula to homebrew-mumei
        if: steps.homebrew-token.outputs.should_update == 'true'
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          cd homebrew-mumei
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/mumei-lang/homebrew-mumei.git"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update Mumei formula to ${{ github.ref_name }}"
          if ! git push origin HEAD:main; then
            echo "::warning::Failed to push Formula to mumei-lang/homebrew-mumei; GitHub Release creation is already complete."
            exit 0
          fi
