name: Release
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
  pages: write
jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            name: mumei-x86_64-apple-darwin
          - target: aarch64-apple-darwin
            os: macos-latest
            name: mumei-aarch64-apple-darwin
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: mumei-x86_64-unknown-linux-gnu
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: mumei-x86_64-unknown-linux-musl
            musl: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: mumei-aarch64-unknown-linux-gnu
            cross: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux' && !matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y libz3-dev pkg-config libssl-dev libzstd-dev
          # LLVM 17 from official apt repo
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc > /dev/null
          codename=$(lsb_release -cs)
          echo "deb http://apt.llvm.org/${codename}/ llvm-toolchain-${codename}-17 main" | sudo tee /etc/apt/sources.list.d/llvm-17.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y llvm-17-dev libclang-17-dev libpolly-17-dev
          echo "LLVM_SYS_170_PREFIX=/usr/lib/llvm-17" >> $GITHUB_ENV
          echo "LIBCLANG_PATH=/usr/lib/llvm-17/lib" >> $GITHUB_ENV
      - name: Install musl toolchain
        if: matrix.musl
        run: |
          sudo apt-get install -y musl-tools
      - name: Install cross-compilation tools (aarch64)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            libz3-dev pkg-config libssl-dev libzstd-dev
          # LLVM 17 from official apt repo
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc > /dev/null
          codename=$(lsb_release -cs)
          echo "deb http://apt.llvm.org/${codename}/ llvm-toolchain-${codename}-17 main" | sudo tee /etc/apt/sources.list.d/llvm-17.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y llvm-17-dev libclang-17-dev libpolly-17-dev
          echo "LLVM_SYS_170_PREFIX=/usr/lib/llvm-17" >> $GITHUB_ENV
          echo "LIBCLANG_PATH=/usr/lib/llvm-17/lib" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> $GITHUB_ENV
      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install z3 llvm@17
          echo "LLVM_SYS_170_PREFIX=$(brew --prefix llvm@17)" >> $GITHUB_ENV
          echo "LIBCLANG_PATH=$(brew --prefix llvm@17)/lib" >> $GITHUB_ENV
          echo "Z3_SYS_Z3_HEADER=$(brew --prefix z3)/include/z3.h" >> $GITHUB_ENV
          echo "Z3_SYS_Z3_LIB_DIR=$(brew --prefix z3)/lib" >> $GITHUB_ENV
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package binary + std library
        run: |
          mkdir -p release-pkg/std
          cp target/${{ matrix.target }}/release/mumei release-pkg/
          cp -r std/* release-pkg/std/
          cd release-pkg
          tar czf ../${{ matrix.name }}.tar.gz .
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.tar.gz
          generate_release_notes: true

  # --- GitHub Pages: install.sh を公開 ---
  deploy-installer:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare GitHub Pages content
        run: |
          mkdir -p gh-pages-dist
          cp scripts/install.sh gh-pages-dist/install.sh
          cat > gh-pages-dist/index.html <<'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head><meta charset="utf-8"><title>Mumei Installer</title></head>
          <body>
          <h1>Mumei Installer</h1>
          <pre><code>curl -fsSL https://mumei-lang.github.io/mumei/install.sh | bash</code></pre>
          <p>See <a href="https://github.com/mumei-lang/mumei">GitHub</a> for more info.</p>
          </body>
          </html>
          HTMLEOF
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-dist
          publish_branch: gh-pages

  # --- Homebrew Formula 自動更新 ---
  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Compute SHA256 checksums
        id: sha256
        run: |
          for f in artifacts/*/mumei-*.tar.gz; do
            name=$(basename "$f" .tar.gz)
            sha=$(sha256sum "$f" | awk '{print $1}')
            echo "${name}_sha256=${sha}" >> "$GITHUB_OUTPUT"
            echo "${name}: ${sha}"
          done
      - name: Checkout homebrew-mumei
        uses: actions/checkout@v4
        with:
          repository: mumei-lang/homebrew-mumei
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-mumei
      - name: Generate Homebrew Formula
        env:
          VERSION: ${{ github.ref_name }}
          SHA_MACOS_ARM: ${{ steps.sha256.outputs['mumei-aarch64-apple-darwin_sha256'] }}
          SHA_MACOS_X86: ${{ steps.sha256.outputs['mumei-x86_64-apple-darwin_sha256'] }}
          SHA_LINUX_ARM: ${{ steps.sha256.outputs['mumei-aarch64-unknown-linux-gnu_sha256'] }}
          SHA_LINUX_X86: ${{ steps.sha256.outputs['mumei-x86_64-unknown-linux-gnu_sha256'] }}
        run: |
          TAG="${VERSION}"
          VER="${VERSION#v}"
          mkdir -p homebrew-mumei/Formula
          cat > homebrew-mumei/Formula/mumei.rb <<FORMULA_END
          # Homebrew Formula for Mumei — auto-generated by release workflow
          class Mumei < Formula
            desc "Mathematical Proof-Driven Programming Language — formally verified with Z3"
            homepage "https://github.com/mumei-lang/mumei"
            license "MIT"
            version "${VER}"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/mumei-lang/mumei/releases/download/${TAG}/mumei-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_MACOS_ARM}"
              else
                url "https://github.com/mumei-lang/mumei/releases/download/${TAG}/mumei-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_MACOS_X86}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/mumei-lang/mumei/releases/download/${TAG}/mumei-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LINUX_ARM}"
              else
                url "https://github.com/mumei-lang/mumei/releases/download/${TAG}/mumei-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LINUX_X86}"
              end
            end

            depends_on "z3"
            depends_on "llvm@17"

            def install
              bin.install "mumei"
              (share/"mumei/std").install Dir["std/*"]

              env_script = <<~EOS
                export MUMEI_STD_PATH="#{share}/mumei/std"
              EOS
              (etc/"mumei").mkpath
              (etc/"mumei/env.sh").write env_script
            end

            def caveats
              <<~EOS
                The Mumei standard library has been installed to:
                  #{share}/mumei/std

                To use it, add the following to your shell profile:
                  export MUMEI_STD_PATH="#{share}/mumei/std"

                Or source the environment file:
                  source #{etc}/mumei/env.sh
              EOS
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/mumei --version")
            end
          end
          FORMULA_END
      - name: Create PR to homebrew-mumei
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-mumei
          branch: update-formula/${{ github.ref_name }}
          title: "Update Mumei formula to ${{ github.ref_name }}"
          body: |
            Automated update from [mumei-lang/mumei release ${{ github.ref_name }}](https://github.com/mumei-lang/mumei/releases/tag/${{ github.ref_name }}).
          commit-message: "Update Mumei formula to ${{ github.ref_name }}"
          delete-branch: true
